<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Head Tilt English Game with Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/jeelizweboji@2.1.2/dist/jeelizFaceTransfer.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Fredoka', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        #score-board {
            font-size: 26px;
            font-weight: 600;
            color: #d63031;
            margin-bottom: 15px;
            background: white;
            padding: 10px 25px;
            border-radius: 30px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }

        #game-container {
            position: relative;
            width: 850px;
            height: 560px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        #sentence-box {
            font-size: 32px;
            font-weight: 600;
            color: #2d3436;
            text-align: center;
            background: #ffeaa7;
            padding: 20px 35px;
            border-radius: 20px;
            width: 90%;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1);
        }

        .blank {
            color: #d63031;
            border-bottom: 4px dashed #d63031;
            padding: 0 15px;
            margin: 0 10px;
        }
        
        .blank.filled {
            color: #27ae60;
            border-bottom-style: solid;
            border-bottom-color: #27ae60;
        }

        #interaction-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            margin: 15px 0;
        }

        .choice-card {
            width: 210px;
            height: 210px;
            background: #fbfbfb;
            border: 5px solid #dfe6e9;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(0,0,0,0.04);
        }

        .choice-card .emoji {
            font-size: 75px;
            margin-bottom: 5px;
        }

        .choice-card .word {
            font-size: 26px;
            font-weight: 600;
            color: #2d3436;
        }

        .choice-card.active {
            transform: scale(1.15);
            border-color: #fdcb6e;
            background: #fff9e6;
            box-shadow: 0 15px 30px rgba(253, 203, 110, 0.4);
        }

        #camera-container {
            position: relative;
            width: 190px;
            height: 190px;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid #6c5ce7;
            background: #000;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.2);
        }

        #webcamVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 1;
        }

        #jeeFaceFilterCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #status-message {
            font-size: 20px;
            color: #6c5ce7;
            font-weight: 600;
            text-align: center;
            background: #eeeefd;
            padding: 10px 30px;
            border-radius: 50px;
            width: 80%;
        }

        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            border-radius: 30px;
            z-index: 10;
        }
        #flash.shutter {
            animation: flashAnim 0.2s ease-out;
        }
        @keyframes flashAnim {
            0% { opacity: 0; }
            25% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* --- DASHBOARD STYLES --- */
        #dashboard {
            width: 95%;
            max-width: 1100px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 3px dashed #6c5ce7;
            padding-bottom: 10px;
        }

        .dashboard-header h2 {
            margin: 0;
            color: #6c5ce7;
            font-size: 28px;
        }

        .clear-btn {
            font-family: 'Fredoka', sans-serif;
            background: #d63031;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.2);
            transition: transform 0.1s;
        }

        .columns-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .category-column {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 15px;
            min-height: 220px;
            border-top: 6px solid #6c5ce7;
        }
        .category-column.books-col { border-top-color: #0984e3; }
        .category-column.writing-col { border-top-color: #e84393; }
        .category-column.speaking-col { border-top-color: #2ecc71; }
        .category-column.reading-col { border-top-color: #f1c40f; }

        .column-title {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            margin-top: 0;
            margin-bottom: 15px;
            color: #2d3436;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .student-snapshot-card {
            background: white;
            border-radius: 15px;
            padding: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid #edf2f7;
        }

        .student-snapshot-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #6c5ce7;
            background: #ddd;
        }

        .student-snapshot-card .class-snippet {
            font-size: 12px;
            color: #636e72;
            margin-top: 6px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="score-board">⭐ Score: <span id="score-count">0</span></div>

    <div id="game-container">
        <div id="flash"></div>

        <div id="sentence-box">
            Waking up camera stream...
        </div>

        <div id="interaction-zone">
            <div id="choice-left" class="choice-card">
                <div class="emoji" id="left-emoji">❓</div>
                <div class="word" id="left-word">...</div>
            </div>

            <div id="camera-container">
                <video id="webcamVideo" autoplay playsinline muted></video>
                <canvas id="jeeFaceFilterCanvas"></canvas>
            </div>

            <div id="choice-right" class="choice-card">
                <div class="emoji" id="right-emoji">❓</div>
                <div class="word" id="right-word">...</div>
            </div>
        </div>

        <div id="status-message">
            📷 Preparing camera sync...
        </div>
    </div>

    <div id="dashboard">
        <div class="dashboard-header">
            <h2>📊 Teacher Result Dashboard</h2>
            <button class="clear-btn" onclick="clearSavedData()">🗑️ Clear Records</button>
        </div>
        <div class="columns-container">
            <div class="category-column books-col">
                <div class="column-title">📚 books</div>
                <div class="cards-grid" id="grid-books"></div>
            </div>
            <div class="category-column writing-col">
                <div class="column-title">✍️ writing</div>
                <div class="cards-grid" id="grid-writing"></div>
            </div>
            <div class="category-column speaking-col">
                <div class="column-title">🗣️ speaking</div>
                <div class="cards-grid" id="grid-speaking"></div>
            </div>
            <div class="category-column reading-col">
                <div class="column-title">📖 reading</div>
                <div class="cards-grid" id="grid-reading"></div>
            </div>
        </div>
    </div>

    <canvas id="hiddenCaptureCanvas" width="320" height="320" style="display:none;"></canvas>

    <script>
        const sentenceTemplate = "I joined the English Club because I love ";
        
        const allOptions = [
            { w: "books", e: "📚" },
            { w: "writing", e: "✍️" },
            { w: "speaking", e: "🗣️" },
            { w: "reading", e: "📖" }
        ];

        const leftCard = document.getElementById('choice-left');
        const rightCard = document.getElementById('choice-right');
        const sentenceBox = document.getElementById('sentence-box');
        const statusMessage = document.getElementById('status-message');
        const scoreCount = document.getElementById('score-count');
        const flash = document.getElementById('flash');
        const webcamVideo = document.getElementById('webcamVideo');
        const captureCanvas = document.getElementById('hiddenCaptureCanvas');

        let currentChoices = [];
        let score = 0;
        let isSelectionLocked = true;
        let tiltDuration = 0;
        
        const TILT_THRESHOLD = 0.22; 
        const HOLD_TIME = 14;        

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playShutterSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(850, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        }

        function speakSentence(fullText) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullText);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        }

        function loadNextQuestion() {
            const shuffled = [...allOptions].sort(() => 0.5 - Math.random());
            currentChoices = [shuffled[0], shuffled[1]];

            sentenceBox.innerHTML = `${sentenceTemplate} <span id="sentence-blank" class="blank">_______</span>.`;
            
            document.getElementById('left-emoji').textContent = currentChoices[0].e;
            document.getElementById('left-word').textContent = currentChoices[0].w;
            
            document.getElementById('right-emoji').textContent = currentChoices[1].e;
            document.getElementById('right-word').textContent = currentChoices[1].w;

            leftCard.classList.remove('active');
            rightCard.classList.remove('active');
            tiltDuration = 0;
            isSelectionLocked = false;
            statusMessage.innerHTML = "↔️ Tilt your head <b>Left</b> or <b>Right</b> to choose!";
        }

        async function initGame() {
            updateDashboardUI();
            try {
                // BUG FIX: Removed absolute sizing to accept natural camera ratios on classrooms screens
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 640 }, 
                        height: { ideal: 480 } 
                    } 
                });
                webcamVideo.srcObject = stream;
                
                JEEFACETRANSFERAPI.init({
                    canvasId: 'jeeFaceFilterCanvas',
                    NNCpath: 'https://cdn.jsdelivr.net/npm/jeelizweboji@2.1.2/dist/',
                    callbackReady: function(errCode) {
                        if (errCode) {
                            statusMessage.innerHTML = `❌ Tracking initialization failed (Code: ${errCode})`;
                            return;
                        }
                        loadNextQuestion();
                        gameLoop();
                    }
                });
            } catch (err) {
                console.error("Camera Error Logged: ", err);
                statusMessage.innerHTML = `❌ Camera stream configuration failed. (${err.name})`;
            }
        }

        function gameLoop() {
            if (JEEFACETRANSFERAPI.is_detected() && !isSelectionLocked) {
                const rotation = JEEFACETRANSFERAPI.get_rotationMorph();
                const roll = rotation[2]; 

                if (roll > TILT_THRESHOLD) {
                    leftCard.classList.add('active');
                    rightCard.classList.remove('active');
                    tiltDuration++;
                    if (tiltDuration % 3 === 0) playTickSound();
                    if (tiltDuration >= HOLD_TIME) triggerSelection(currentChoices[0].w);
                } 
                else if (roll < -TILT_THRESHOLD) {
                    rightCard.classList.add('active');
                    leftCard.classList.remove('active');
                    tiltDuration++;
                    if (tiltDuration % 3 === 0) playTickSound();
                    if (tiltDuration >= HOLD_TIME) triggerSelection(currentChoices[1].w);
                } 
                else {
                    leftCard.classList.remove('active');
                    rightCard.classList.remove('active');
                    tiltDuration = 0;
                }
            } else if (!isSelectionLocked) {
                leftCard.classList.remove('active');
                rightCard.classList.remove('active');
                tiltDuration = 0;
            }
            requestAnimationFrame(gameLoop);
        }

        function captureStudentSnapshot() {
            const ctx = captureCanvas.getContext('2d');
            ctx.translate(captureCanvas.width, 0);
            ctx.scale(-1, 1);
            const size = Math.min(webcamVideo.videoWidth, webcamVideo.videoHeight);
            const sX = (webcamVideo.videoWidth - size) / 2;
            const sY = (webcamVideo.videoHeight - size) / 2;
            ctx.drawImage(webcamVideo, sX, sY, size, size, 0, 0, captureCanvas.width, captureCanvas.height);
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            return captureCanvas.toDataURL('image/jpeg', 0.6);
        }

        function triggerSelection(chosenWord) {
            isSelectionLocked = true;
            playShutterSound();
            flash.classList.add('shutter');
            
            const snapshot = captureStudentSnapshot();
            setTimeout(() => flash.classList.remove('shutter'), 200);

            document.getElementById('sentence-blank').textContent = chosenWord;
            document.getElementById('sentence-blank').classList.add('filled');
            statusMessage.innerHTML = `📸 <b>Captured!</b> Reading out loud...`;
            
            const fullStatement = `${sentenceTemplate} ${chosenWord}.`;
            speakSentence(fullStatement);

            let history = JSON.parse(localStorage.getItem('englishClubRandomizedRecords')) || [];
            history.push({ word: chosenWord, image: snapshot });
            localStorage.setItem('englishClubRandomizedRecords', JSON.stringify(history));
            updateDashboardUI();

            score++;
            scoreCount.textContent = score;

            setTimeout(loadNextQuestion, 3500);
        }

        function updateDashboardUI() {
            const grids = {
                books: document.getElementById('grid-books'),
                writing: document.getElementById('grid-writing'),
                speaking: document.getElementById('grid-speaking'),
                reading: document.getElementById('grid-reading')
            };
            
            Object.values(grids).forEach(grid => grid.innerHTML = '');
            
            const history = JSON.parse(localStorage.getItem('englishClubRandomizedRecords')) || [];
            history.forEach(item => {
                const card = document.createElement('div');
                card.className = 'student-snapshot-card';
                card.innerHTML = `<img src="${item.image}"><div class="class-snippet">love <b>${item.word}</b></div>`;
                
                if (grids[item.word]) {
                    grids[item.word].appendChild(card);
                }
            });
        }

        function clearSavedData() {
            if (confirm("Clear all student submissions?")) {
                localStorage.removeItem('englishClubRandomizedRecords');
                updateDashboardUI();
            }
        }

        window.addEventListener('DOMContentLoaded', initGame);
    </script>
</body>
</html>
