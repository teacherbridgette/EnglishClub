<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Tilt English Game</title>
    
    <!-- Include Jeeliz Weboji library for head tracking -->
    <script src="https://cdn.jsdelivr.net/npm/jeelizweboji@2.1.2/dist/jeelizFaceTransfer.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        #sentence-box {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            text-align: center;
            margin-top: 20px;
            background: #eef2f7;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px dashed #3498db;
            width: 80%;
        }

        .blank {
            color: #e74c3c;
            border-bottom: 3px solid #e74c3c;
            padding: 0 10px;
        }

        #interaction-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-grow: 1;
            margin: 20px 0;
            position: relative;
        }

        .choice-card {
            width: 180px;
            height: 220px;
            background: #f8f9fa;
            border: 4px solid #bdc3c7;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .choice-card .emoji {
            font-size: 70px;
            margin-bottom: 10px;
        }

        .choice-card .word {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }

        /* Target styles when tilting head */
        .choice-card.active {
            transform: scale(1.15);
            border-color: #2ecc71;
            background: #e8f8f5;
            box-shadow: 0 10px 25px rgba(46, 204, 113, 0.3);
        }

        #camera-container {
            position: relative;
            width: 240px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #34495e;
            background: #000;
        }

        /* The hidden canvas used by Jeeliz, and the mirrored video feed */
        #jeeFaceFilterCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror view */
        }

        #status-message {
            font-size: 18px;
            color: #7f8c8d;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Flash effect for the camera click */
        #flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            border-radius: 20px;
            transition: opacity 0.1s ease-out;
            z-index: 10;
        }
        #flash.shutter {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="flash"></div>

        <div id="sentence-box">
            I joined the English Club because I love <span id="sentence-blank" class="blank">_______</span>.
        </div>

        <div id="interaction-zone">
            <!-- Left Choice -->
            <div id="choice-left" class="choice-card">
                <div class="emoji">📚</div>
                <div class="word">books</div>
            </div>

            <!-- Center Camera Feed -->
            <div id="camera-container">
                <canvas id="jeeFaceFilterCanvas"></canvas>
            </div>

            <!-- Right Choice -->
            <div id="choice-right" class="choice-card">
                <div class="emoji">✍️</div>
                <div class="word">writing</div>
            </div>
        </div>

        <div id="status-message">
            Loading camera and face tracking... Please allow camera access.
        </div>
    </div>

    <script>
        const leftCard = document.getElementById('choice-left');
        const rightCard = document.getElementById('choice-right');
        const blankSpace = document.getElementById('sentence-blank');
        const statusMessage = document.getElementById('status-message');
        const flash = document.getElementById('flash');

        let isSelectionLocked = false;
        let tiltDuration = 0;
        const TILT_THRESHOLD = 0.25; // How much to tilt head (radians/values)
        const HOLD_TIME = 20; // Number of consecutive frames to hold tilt to trigger click

        // Generate synthetic camera click audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClickSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Text to Speech
        function speakSentence(chosenWord) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();
                
                const text = `I joined the English Club because I love ${chosenWord}.`;
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9; // Slightly slower for clarity
                window.speechSynthesis.speak(utterance);
            }
        }

        // Initialize Jeeliz Face Transfer
        function initGame() {
            JEEFACETRANSFERAPI.init({
                canvasId: 'jeeFaceFilterCanvas',
                NNCpath: 'https://cdn.jsdelivr.net/npm/jeelizweboji@2.1.2/dist/', // Location of neural network model
                callbackReady: function(errCode) {
                    if (errCode) {
                        console.error('Jeeliz initialization failed:', errCode);
                        statusMessage.innerHTML = "❌ Camera initialization failed. Please refresh and grant permissions.";
                        return;
                    }
                    statusMessage.innerHTML = "↔️ Tilt your head <b>Left</b> or <b>Right</b> to choose!";
                    gameLoop();
                }
            });
        }

        function gameLoop() {
            if (JEEFACETRANSFERAPI.is_detected()) {
                // Get rotation angles. [pitch, yaw, roll]
                // Roll measures head tilt left/right
                const rotation = JEEFACETRANSFERAPI.get_rotationMorph();
                const roll = rotation[2]; 

                if (!isSelectionLocked) {
                    // Head tilted RIGHT (Mirrored: corresponds to Left Card on screen)
                    if (roll > TILT_THRESHOLD) {
                        leftCard.classList.add('active');
                        rightCard.classList.remove('active');
                        tiltDuration++;

                        if (tiltDuration >= HOLD_TIME) {
                            triggerSelection('books');
                        }
                    } 
                    // Head tilted LEFT (Mirrored: corresponds to Right Card on screen)
                    else if (roll < -TILT_THRESHOLD) {
                        rightCard.classList.add('active');
                        leftCard.classList.remove('active');
                        tiltDuration++;

                        if (tiltDuration >= HOLD_TIME) {
                            triggerSelection('writing');
                        }
                    } 
                    // Head centered
                    else {
                        leftCard.classList.remove('active');
                        rightCard.classList.remove('active');
                        tiltDuration = 0;
                    }
                }
            } else {
                // Face lost tracking
                leftCard.classList.remove('active');
                rightCard.classList.remove('active');
                tiltDuration = 0;
            }

            requestAnimationFrame(gameLoop);
        }

        function triggerSelection(word) {
            isSelectionLocked = true;
            
            // Camera Shutter Flash Effect
            playClickSound();
            flash.classList.add('shutter');
            setTimeout(() => flash.classList.remove('shutter'), 150);

            // Update UI
            blankSpace.textContent = word;
            statusMessage.innerHTML = `🎉 Selected: <b>${word}</b>! Reading out loud...`;

            // TTS Audio output
            speakSentence(word);

            // Reset game after 4 seconds to try again
            setTimeout(() => {
                blankSpace.textContent = "_______";
                statusMessage.innerHTML = "↔️ Tilt your head <b>Left</b> or <b>Right</b> to choose again!";
                leftCard.classList.remove('active');
                rightCard.classList.remove('active');
                tiltDuration = 0;
                isSelectionLocked = false;
            }, 4000);
        }

        // Start everything on load
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
